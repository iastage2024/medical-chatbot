site_name: Medical Chatbot Documentation
site_description: Deployment and architecture documentation for the Medical Chatbot project
site_author: stage
repo_url: https://github.com/your-username/medical-chatbot
repo_name: medical-chatbot

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - footnotes
  - tables
  - attr_list

nav:
  - Home: index.md
  - Deployment:
      - Google Cloud Setup: google-cloud-setup.md
      - CI/CD Pipeline: cicd-pipeline.md
  - Architecture:
      - Project Structure: project-structure.md
      - API Logic: api.md
      - Safety Layer: safety.md
  - Prompts: prompts.md
  - Changelog: changelog.md
